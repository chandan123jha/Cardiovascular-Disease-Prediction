<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Detection System</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('{{ url_for('static', filename='images/20.png') }}') no-repeat center/cover;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(15, 23, 42, 0.92);
            border-radius: 24px;
            padding: 42px 48px;
            max-width: 720px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        }
        h1 {
            margin-bottom: 14px;
            font-size: 3rem;
            letter-spacing: 1px;
        }
        p {
            margin-bottom: 33px;
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.75;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .button {
            background: #4caf50;
            color: white;
            padding: 14px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            background: #3a8a3a;
        }
        .button.exit {
            background: #ef4444;
        }
        .button.exit:hover {
            background: #d12c2c;
        }
        @media (max-width: 768px) {
    body {
        padding: 20px;
    }

    .card {
        padding: 30px 20px;
        border-radius: 18px;
    }

    h1 {
        font-size: 2rem;
    }

    p {
        font-size: 0.95rem;
    }

    .button-group {
        flex-direction: column;
    }

    .button {
        width: 100%;
        text-align: center;
        padding: 12px;
    }
        }
        @media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .card {
        padding: 25px 15px;
    }

    h1 {
        font-size: 1.6rem;
    }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cardiovascular Disease Prediction</h1>
        <div class="button-group">
            <a href="{{ url_for('login') }}" class="button">Login</a>
            <a href="{{ url_for('register') }}" class="button">Register</a>
            <a href="#" class="button exit" onclick="window.close()">Exit</a>
        </div>
    </div>
</body>
</html>
