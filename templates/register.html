<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('{{ url_for('static', filename='images/reg1.jpg') }}') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
            position: relative;
            overflow: hidden;
      }
        .register-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
            pointer-events: none;
        }
        h2 {
            margin: 0 0 24px;
            text-align: center;
            color: #2c3e50;
            letter-spacing: 1px;
        }
        .field-group {
            margin-bottom: 16px;
        }
        .field-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        .field-group input,
        .field-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            outline: none;
        }
        .field-group input:focus,
        .field-group select:focus {
            border-color: #4caf50;
        }
        .radio-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .radio-group label {
            font-weight: 500;
            color: #2c3e50;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #4caf50;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background: #3a8a3a;
        }
        .flash {
            color: #1b5e20;
            text-align: center;
            margin-bottom: 12px;
        }
        @media (max-width: 768px) {
    body {
        padding: 20px;
    }

    .register-card {
        padding: 25px 20px;
        border-radius: 16px;
    }

    h2 {
        font-size: 1.5rem;
    }

    .field-group input,
    .field-group select {
        padding: 10px;
        font-size: 0.95rem;
    }

    button {
        padding: 12px;
        font-size: 0.95rem;
    }

    .radio-group {
        gap: 10px;
    }
}
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .register-card {
        padding: 20px 15px;
    }

    h2 {
        font-size: 1.3rem;
    }

    .radio-group {
        flex-direction: column;
    }
}
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Registration Form</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="field-group">
                <label>Full Name :</label>
                <input type="text" name="fullname" placeholder="Enter full name" required>
            </div>
            <div class="field-group">
                <label>Address :</label>
                <input type="text" name="address" placeholder="Enter address" required>
            </div>
            <div class="field-group">
                <label>User Name :</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="field-group">
                <label>E-mail :</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="field-group">
                <label>Phone number :</label>
                <input type="text" name="phoneno" placeholder="Enter phone number" required>
            </div>
            <div class="field-group">
                <label>Gender :</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                </div>
            </div>
            <div class="field-group">
                <label>Age :</label>
                <input type="number" name="age" placeholder="Enter age" required>
            </div>
            <div class="field-group">
                <label>Password :</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="field-group">
                <label>Confirm Password :</label>
                <input type="password" name="confirm_password" placeholder="Confirm password" required>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
