<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
           background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('{{ url_for('static', filename='images/patient-report-generated.png') }}') no-repeat center/cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #edf2f7;
            padding: 24px;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(15, 24, 40, 0.95);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 22px 80px rgba(0, 0, 0, 0.45);
            text-align: center;
        }
        h2 {
            margin-bottom: 22px;
            font-size: 2rem;
            letter-spacing: 0.5px;
        }
        .result {
            font-size: 1.4rem;
            font-weight: 700;
            padding: 24px;
            border-radius: 18px;
            margin: 20px auto;
            max-width: 90%;
            line-height: 1.6;
        }
        .abnormal {
            background: rgba(255, 90, 90, 0.18);
            color: #ffcccb;
            border: 1px solid rgba(255, 90, 90, 0.65);
        }
        .normal {
            background: rgba(72, 187, 120, 0.18);
            color: #c8f7c5;
            border: 1px solid rgba(72, 187, 120, 0.65);
        }
        p {
            color: #cbd5e1;
            margin: 18px 0 28px;
            line-height: 1.75;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }
        .actions a {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .actions a.download {
            background: #4caf50;
            color: #0f172a;
        }
        .actions a.secondary {
            background: rgba(255,255,255,0.15);
            color: #edf2f7;
        }
        .actions a:hover {
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
    .container {
        padding: 25px 18px;
        border-radius: 18px;
    }

    h2 {
        font-size: 1.6rem;
    }

    .result {
        font-size: 1.1rem;
        padding: 18px;
    }

    p {
        font-size: 0.95rem;
    }

    .actions {
        flex-direction: column;
    }

    .actions a {
        width: 100%;
        text-align: center;
        padding: 12px;
    }
}
@media (max-width: 480px) {
    body {
        padding: 10px;
    }

    .container {
        padding: 18px 12px;
    }

    h2 {
        font-size: 1.3rem;
    }

    .result {
        font-size: 1rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <h2>Prediction Result</h2>
        <div class="result {{ 'abnormal' if color == 'red' else 'normal' }}">
            {{ result }}
        </div>
        <p>Your report has been generated and saved to the patient report folder. You can download the PDF or continue with another prediction.</p>
        <div class="actions">
            {% if pdf_path %}
            <a href="{{ url_for('download_file', filename=pdf_path) }}" class="download">Download Report</a>
            {% endif %}
            <a href="{{ url_for('predict') }}" class="secondary">Predict Again</a>
            <a href="{{ url_for('logout') }}" class="secondary">Logout</a>
        </div>
    </div>
</body>
</html>
